<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>

    </style>
</head>
<body>
    <div class=form action="">
        <h1>Formulário</h1>

        <form method="POST" action="https://localhost:3003/usuarios">
        <input type="hdden" name="id" value="3">

        <div class="form-group">
         <label for="name">Nome</label>
         <input type="text" id="name" name="name" placeholder="Digite a sua nome">
         </div>

         <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" placeholder="Digite a sua senha">
         </div>

         <div class="form-group">
            <label for="bio">BIo</label>
            <textarea name="bio" id="bio" cols="30" rows="10"  placeholder="Conte um pouco sobre você"></textarea>
         </div>
         <fieldset class="form-group">
            <legend>Tipo de usuário</legend>
            <label for="admin">
                <input type="radio" name="tipo" id="admin" value="admin"> admin
            </label>
            <label for="regular">
            <input type="radio" name="regular" id="regular" value="regular"> Regular
            </label>
            <label for="professor">
                <input type="radio" name="tipo" id="professor" value="professor"> professor
            </label>

         </fieldset>
        </form>
      </div>
</body>
</html>
